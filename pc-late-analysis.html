  const dormColors=['#3087CC','#EAB308','#F29100','#F29100','#F29100','#DC2626','#DC2626','#DC2626','#DC2626'];
  echarts.init(document.getElementById('chartDormHour')).setOption({
    grid:{left:40,right:20,top:25,bottom:30},
    tooltip:{trigger:'axis'},
    xAxis:{type:'category',data:dormHrs,axisLabel:{fontSize:10,color:'#9CA3AF'}},
    yAxis:{type:'value',axisLabel:{fontSize:10,color:'#9CA3AF'},splitLine:{lineStyle:{color:'#F3F4F6'}}},
    series:[{type:'bar',data:dormVal.map((v,i)=>({value:v,itemStyle:{color:dormColors[i],borderRadius:[4,4,0,0]}})),label:{show:true,position:'top',fontSize:9,color:'#6B7280'}}]
  });
}

renderRows();initCharts();
</script>
