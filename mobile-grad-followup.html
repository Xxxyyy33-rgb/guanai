<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>导学跟进 - 知行护航工程</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#3087CC','primary-light':'#E3F1F9','primary-dark':'#006DAD',brand:'#DF2027',level1:'#3087CC',level2:'#F29100',level3:'#DF2027',success:'#1BB975',warning:'#F29100',danger:'#DF2027',ai:'#7C3AED','ai-light':'#A78BFA',wechat:'#07C160'},fontFamily:{sans:['OPPOSans','-apple-system','PingFang SC','Microsoft YaHei','sans-serif']}}}}</script>
<link href="https://cdn.jsdelivr.net/npm/cn-fontsource-oppo-sans-3@1.0.5/index.min.css" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<style>
body{max-width:375px;margin:0 auto;background:#f5f5f5;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
.event-tile{position:relative;padding:14px 12px;border-radius:14px;background:#fff;border:1px solid #f3f4f6;text-align:center;transition:all .15s;}
.event-tile:active{transform:scale(.97);background:#f9fafb;}
.event-tile .ic{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;}
.event-tile .nm{font-size:13px;font-weight:500;color:#1f2937;line-height:1.3;}
.event-tile .ct{position:absolute;top:8px;right:8px;font-size:10px;color:#9ca3af;background:#f3f4f6;padding:1px 6px;border-radius:999px;}
.event-tile .ct.hot{background:#FEF2F2;color:#DC2626;}

.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:60;}
.sheet-overlay.show{display:block;}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:375px;background:#fff;border-radius:18px 18px 0 0;z-index:61;transition:transform .28s ease;max-height:92vh;display:flex;flex-direction:column;}
.sheet.show{transform:translateX(-50%) translateY(0);}
.sheet-head{padding:14px 16px 8px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sheet-body{flex:1;overflow-y:auto;padding:14px 16px 16px;}
.sheet-foot{padding:10px 16px calc(10px + env(safe-area-inset-bottom,0px));border-top:1px solid #f3f4f6;flex-shrink:0;background:#fff;}

.chip{display:inline-flex;align-items:center;padding:6px 12px;border:1px solid #e5e7eb;border-radius:999px;font-size:12px;color:#4b5563;background:#fff;cursor:pointer;transition:all .15s;}
.chip:active{transform:scale(.96);}
.chip.active{background:#E3F1F9;border-color:#3087CC;color:#006DAD;font-weight:500;}
.chip.tpl{background:#F9FAFB;border:1px dashed #d1d5db;color:#6b7280;font-size:11px;padding:5px 10px;}
.chip.tpl:active{background:#EFF6FF;color:#3087CC;border-color:#3087CC;border-style:solid;}

.stu-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 8px 4px 4px;background:#EFF6FF;color:#1e40af;border-radius:999px;font-size:12px;}
.stu-pill .av{width:20px;height:20px;background:#3087CC;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;}
.stu-pill .rm{margin-left:2px;color:#94a3b8;cursor:pointer;}

.stu-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f9fafb;cursor:pointer;}
.stu-row:active{background:#f9fafb;}
.stu-row .av{width:36px;height:36px;border-radius:50%;background:#EFF6FF;color:#1e40af;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;margin-right:10px;flex-shrink:0;}
.stu-row .info{flex:1;min-width:0;}
.stu-row .nm{font-size:14px;color:#1f2937;font-weight:500;}
.stu-row .sub{font-size:11px;color:#9ca3af;margin-top:1px;}
.stu-row .ck{width:20px;height:20px;border:1.5px solid #d1d5db;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.stu-row.checked .ck{background:#3087CC;border-color:#3087CC;}
.stu-row.checked .ck::after{content:'';width:5px;height:9px;border-right:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(45deg);margin-bottom:2px;}

.rec-card{background:#fff;border-radius:12px;padding:12px 14px;box-shadow:0 1px 2px rgba(0,0,0,.03);border:1px solid #f3f4f6;}
.toast{position:fixed;left:50%;top:30%;transform:translateX(-50%);background:rgba(17,24,39,.92);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:80;opacity:0;transition:opacity .25s;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body class="pb-24">

<!-- Header -->
<div class="bg-white sticky top-0 z-40 border-b border-gray-100">
  <div class="flex items-center justify-between px-4 py-3">
    <button onclick="history.back()" class="text-gray-600 active:opacity-60"><svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg></button>
    <h1 class="text-base font-semibold text-gray-800">导学跟进</h1>
    <a href="mobile-grad-followup-list.html" class="text-xs text-primary active:opacity-60">全部记录</a>
  </div>
</div>

<!-- 提示语 -->
<div class="px-4 pt-3 pb-1">
  <div class="text-[12px] text-gray-500">点选事件类型 → 选学生 → 提交，三步完成。</div>
</div>

<!-- 6 大事件类型 -->
<div class="px-4 pt-2 grid grid-cols-3 gap-2.5" id="eventGrid"></div>

<!-- 最近 5 条记录 -->
<div class="px-4 mt-5">
  <div class="flex items-center justify-between mb-2">
    <span class="text-sm font-semibold text-gray-700">最近记录</span>
    <a href="mobile-grad-followup-list.html" class="text-xs text-gray-400 active:opacity-60">查看全部 ›</a>
  </div>
  <div class="space-y-2" id="recentList"></div>
</div>

<!-- ============ 录入 抽屉 ============ -->
<div class="sheet-overlay" id="formOverlay" onclick="closeForm()"></div>
<div class="sheet" id="formSheet">
  <div class="sheet-head">
    <div class="flex items-center gap-2">
      <div id="fmIcon" class="w-8 h-8 rounded-lg flex items-center justify-center"></div>
      <div>
        <div class="text-base font-semibold text-gray-800" id="fmTitle">新建记录</div>
        <div class="text-[11px] text-gray-400">事件类型已锁定，下方信息越少越好</div>
      </div>
    </div>
    <button onclick="closeForm()" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 active:opacity-70"><svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
  </div>

  <div class="sheet-body">
    <!-- 学生（必填） -->
    <div class="mb-4">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm font-medium text-gray-700">学生 <span class="text-red-500">*</span></span>
        <span id="selCntText" class="text-[11px] text-gray-400">未选择</span>
      </div>
      <div id="selPills" class="flex flex-wrap gap-1.5 mb-2"></div>
      <button type="button" onclick="openStuPicker()" class="w-full py-2.5 rounded-xl border-2 border-dashed border-primary/40 text-primary text-sm font-medium active:bg-primary/5 flex items-center justify-center gap-1.5">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
        选择学生（支持多选）
      </button>
    </div>

    <!-- 日期（默认今天，3 个快捷） -->
    <div class="mb-4">
      <div class="text-sm font-medium text-gray-700 mb-2">发生日期</div>
      <div class="flex items-center gap-2 flex-wrap">
        <button type="button" onclick="setDate(0,this)" class="dt-chip chip active">今天</button>
        <button type="button" onclick="setDate(-1,this)" class="dt-chip chip">昨天</button>
        <button type="button" onclick="setDate(-7,this)" class="dt-chip chip">本周</button>
        <input type="date" id="fmDate" oninput="pickCustomDate()" class="dt-chip text-xs border border-gray-200 rounded-full px-3 py-1.5 text-gray-600 bg-white">
      </div>
    </div>

    <!-- 备注（选填，默认折叠提示模板） -->
    <div class="mb-3">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm font-medium text-gray-700">备注</span>
        <span class="text-[11px] text-gray-400">选填</span>
      </div>
      <textarea id="fmNote" rows="2" placeholder="一句话说明即可，可不填" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-primary resize-none"></textarea>
      <div class="flex flex-wrap gap-1.5 mt-2" id="fmTpl"></div>
    </div>

    <div class="text-[11px] text-gray-400 bg-gray-50 rounded-lg px-3 py-2 flex items-start gap-1.5">
      <svg class="w-3.5 h-3.5 mt-0.5 flex-shrink-0 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <span>多选学生时，将为每位学生各生成 1 条记录。</span>
    </div>
  </div>

  <div class="sheet-foot">
    <div class="flex items-center gap-2">
      <button onclick="closeForm()" class="flex-1 py-3 rounded-xl border border-gray-200 text-gray-600 text-sm font-medium active:bg-gray-50">取消</button>
      <button id="fmSubmit" onclick="submitForm()" class="flex-[1.6] py-3 rounded-xl bg-primary text-white text-sm font-semibold active:opacity-80">提交记录</button>
    </div>
  </div>
</div>

<!-- ============ 学生选择 二级 抽屉 ============ -->
<div class="sheet-overlay" id="stuOverlay" onclick="closeStuPicker()"></div>
<div class="sheet" id="stuSheet">
  <div class="sheet-head">
    <div>
      <div class="text-base font-semibold text-gray-800">选择学生</div>
      <div class="text-[11px] text-gray-400">可多选；从"我的课题组"或"最近"快速选取</div>
    </div>
    <button onclick="closeStuPicker()" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 active:opacity-70"><svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
  </div>

  <div class="sheet-body">
    <!-- 搜索 -->
    <div class="relative mb-3">
      <svg class="w-4 h-4 absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
      <input id="stuKw" oninput="renderStuList()" type="text" placeholder="搜索姓名 / 学号" class="w-full text-sm border border-gray-200 rounded-xl pl-8 pr-3 py-2.5 focus:outline-none focus:border-primary">
    </div>

    <!-- 快捷分组 -->
    <div class="flex items-center gap-2 mb-3 overflow-x-auto" id="stuGroupChips">
      <button onclick="pickGroup(this,'all')" class="grp-chip chip active">全部学生</button>
      <button onclick="pickGroup(this,'recent')" class="grp-chip chip">最近录入</button>
    </div>

    <!-- 一键全选 -->
    <div class="flex items-center justify-between text-xs mb-1">
      <span class="text-gray-500">列表中共 <span id="stuListCnt" class="text-gray-700 font-medium">0</span> 名</span>
      <button onclick="toggleSelectAllInList()" id="stuAllBtn" class="text-primary active:opacity-60">全选当前列表</button>
    </div>

    <div id="stuList"></div>
  </div>

  <div class="sheet-foot">
    <div class="flex items-center gap-2">
      <span class="text-xs text-gray-500 mr-auto">已选 <span id="stuPickedCnt" class="text-primary font-semibold">0</span> 人</span>
      <button onclick="clearSelected()" class="px-3 py-2 rounded-lg border border-gray-200 text-gray-600 text-xs active:bg-gray-50">清空</button>
      <button onclick="confirmStuPick()" class="px-5 py-2 rounded-lg bg-primary text-white text-sm font-medium active:opacity-80">确定</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* =========== 事件类型定义 =========== */
const EVENTS=[
  {key:'lab_absent',  name:'实验室缺勤', short:'缺勤实验室', icon:'🧪', color:'#F59E0B', bg:'#FEF3C7',
    tpls:['电话已提醒，未说明原因','面谈过，承诺改正','已通知导师','身体不适已请假']},
  {key:'meet_absent', name:'组会缺勤',   short:'缺勤组会',   icon:'📋', color:'#F97316', bg:'#FFEDD5',
    tpls:['上周组会未到','已连续 2 周缺席','与导师确认情况','学生在外实习']},
  {key:'advisor_conf',name:'导学矛盾',   short:'导学矛盾',   icon:'⚠️', color:'#DC2626', bg:'#FEE2E2',
    tpls:['调解后仍未改善','已上报学院','导师反映沟通困难','学生情绪激动']},
  {key:'change_advisor',name:'更换导师', short:'更换导师',   icon:'🔄', color:'#7C3AED', bg:'#EDE9FE',
    tpls:['课题进展不顺','研究方向调整','导师离职','双方协商一致']},
  {key:'milestone',   name:'培养任务未按时进行',short:'培养任务',icon:'📅', color:'#0891B2', bg:'#CFFAFE',
    tpls:['开题未按时完成','预答辩延期','中期考核延期','论文送审延期']},
  {key:'enroll_warn', name:'最后一年未达到毕业要求',short:'未达毕业',icon:'🚨', color:'#B91C1C', bg:'#FEE2E2',
    tpls:['论文未完成','已申请延期','已申请结业','拟办退学']}
];

/* =========== 学生 mock =========== */
const STUDENTS=[
  {sid:'2023010001',name:'张明远',major:'计算机科学与技术',advisor:'王老师',group:'mygrp'},
  {sid:'2023010002',name:'李思雨',major:'计算机科学与技术',advisor:'王老师',group:'mygrp'},
  {sid:'2023010003',name:'王浩然',major:'计算机科学与技术',advisor:'王老师',group:'mygrp'},
  {sid:'2023010004',name:'赵雪儿',major:'计算机科学与技术',advisor:'王老师',group:'mygrp'},
  {sid:'2022030015',name:'刘文博',major:'软件工程',advisor:'王老师',group:'mygrp'},
  {sid:'2022030016',name:'陈嘉怡',major:'软件工程',advisor:'王老师',group:'mygrp'},
  {sid:'2024050118',name:'周晨曦',major:'电子信息',advisor:'李老师',group:'other'},
  {sid:'2024050119',name:'吴梓涵',major:'电子信息',advisor:'李老师',group:'other'},
  {sid:'2022010099',name:'马云鹏',major:'材料工程',advisor:'李老师',group:'other'},
  {sid:'2023040112',name:'郑昊然',major:'机械工程',advisor:'李老师',group:'other'},
  {sid:'2023040113',name:'胡瑞',    major:'机械工程',advisor:'李老师',group:'other'},
  {sid:'2024010088',name:'高一鸣',  major:'交通工程',advisor:'陈老师',group:'other'},
  {sid:'2022040201',name:'林婧',    major:'交通工程',advisor:'陈老师',group:'other'},
  {sid:'2023050026',name:'徐子轩',  major:'冶金工程',advisor:'陈老师',group:'other'},
  {sid:'2024020055',name:'孙雨桐',  major:'土木工程',advisor:'陈老师',group:'other'}
];

/* =========== 记录数据（localStorage 持久化，跨页面共享） =========== */
const STORE_KEY='gradFollowupRecords';
const SEED_RECORDS=[
  {id:'r1',ev:'meet_absent',sids:['2023010001','2023010002'],date:'2026-05-12',note:'上周组会均未到',by:'王老师',ts:Date.now()-2*86400000},
  {id:'r2',ev:'lab_absent', sids:['2022030015'],            date:'2026-05-11',note:'连续 3 天未到实验室',by:'王老师',ts:Date.now()-3*86400000},
  {id:'r3',ev:'milestone',  sids:['2023010003'],            date:'2026-05-08',note:'开题答辩延期至 6 月',by:'王老师',ts:Date.now()-6*86400000},
  {id:'r4',ev:'advisor_conf',sids:['2022030016'],           date:'2026-05-05',note:'调解后仍未改善，已上报学院',by:'王老师',ts:Date.now()-9*86400000},
  {id:'r5',ev:'lab_absent', sids:['2023010004','2022030015','2023010002'],date:'2026-05-03',note:'本周组会全员到场，仅周一缺勤',by:'王老师',ts:Date.now()-11*86400000},
  {id:'r6',ev:'enroll_warn',sids:['2022030016'],            date:'2026-04-28',note:'最长年限第 5 年，论文未送审',by:'王老师',ts:Date.now()-16*86400000}
];
function loadRecords(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(raw){const arr=JSON.parse(raw);if(Array.isArray(arr))return arr;}
  }catch(e){}
  /* 首次访问：写入种子数据 */
  localStorage.setItem(STORE_KEY,JSON.stringify(SEED_RECORDS));
  return SEED_RECORDS.slice();
}
function saveRecords(){localStorage.setItem(STORE_KEY,JSON.stringify(RECORDS));}
function genRecId(){return 'r'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

const RECORDS=loadRecords();

/* =========== 全局状态 =========== */
let curEvent=null;
let selectedSids=new Set();
let stuGroup='all';

/* 当前月份起始时间戳，用于事件计数 */
function monthStartMs(){const d=new Date();return new Date(d.getFullYear(),d.getMonth(),1).setHours(0,0,0,0);}
function eventMonthCount(evKey){
  const ms=monthStartMs();
  let n=0;
  RECORDS.forEach(r=>{if(r.ev===evKey&&r.ts>=ms){n+=(r.sids||[]).length;}});
  return n;
}

/* =========== 渲染：事件 6 大方块 =========== */
function renderEvents(){
  document.getElementById('eventGrid').innerHTML=EVENTS.map(e=>{
    const c=eventMonthCount(e.key);
    return `<button onclick="openForm('${e.key}')" class="event-tile">
      <span class="ct ${c>=5?'hot':''}">本月 ${c}</span>
      <div class="ic" style="background:${e.bg};">
        <span style="font-size:18px;">${e.icon}</span>
      </div>
      <div class="nm">${e.name}</div>
    </button>`;
  }).join('');
}

/* =========== 渲染：最近 5 条 =========== */
function renderRecent(){
  const list=RECORDS.slice().sort((a,b)=>b.ts-a.ts).slice(0,5);
  const box=document.getElementById('recentList');
  if(!list.length){box.innerHTML='<div class="text-center text-xs text-gray-400 py-6">暂无记录</div>';return;}
  box.innerHTML=list.map(r=>recCardHtml(r)).join('');
}

function recCardHtml(r){
  const ev=EVENTS.find(e=>e.key===r.ev);
  const stuList=(r.sids||[]).map(s=>(STUDENTS.find(x=>x.sid===s)||{}).name||s).filter(Boolean);
  const stuTxt=stuList.length>2?stuList.slice(0,2).join('、')+` 等 ${stuList.length} 人`:stuList.join('、');
  return `<div class="rec-card relative">
    <button onclick="deleteRecord('${r.id}',event)" class="absolute top-2.5 right-2.5 w-7 h-7 flex items-center justify-center rounded-full text-gray-400 active:bg-red-50 active:text-red-500" aria-label="删除">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg>
    </button>
    <div class="flex items-center gap-1.5 mb-1.5 pr-8">
      <span class="w-5 h-5 rounded flex items-center justify-center text-[12px]" style="background:${ev.bg};">${ev.icon}</span>
      <span class="text-[13px] font-medium" style="color:${ev.color};">${ev.short}</span>
      <span class="text-[11px] text-gray-400 ml-auto">${r.date.slice(5)}</span>
    </div>
    <div class="text-sm text-gray-800 mb-0.5">${stuTxt}</div>
    ${r.note?`<div class="text-[12px] text-gray-500 line-clamp-1">${r.note}</div>`:''}
  </div>`;
}

/* =========== 删除记录 =========== */
function deleteRecord(id,e){
  if(e){e.preventDefault();e.stopPropagation();}
  if(!confirm('确认删除该条记录？删除后无法恢复。'))return;
  const idx=RECORDS.findIndex(r=>r.id===id);
  if(idx<0)return;
  RECORDS.splice(idx,1);
  saveRecords();
  renderEvents();
  renderRecent();
  showToast('已删除');
}

/* =========== 录入弹窗 =========== */
function openForm(evKey){
  curEvent=EVENTS.find(e=>e.key===evKey);
  selectedSids.clear();
  document.getElementById('fmTitle').textContent=curEvent.name;
  document.getElementById('fmIcon').style.background=curEvent.bg;
  document.getElementById('fmIcon').innerHTML=`<span style="font-size:16px;">${curEvent.icon}</span>`;
  document.getElementById('fmNote').value='';
  // 日期默认今天
  document.getElementById('fmDate').value=fmtDate(new Date());
  document.querySelectorAll('.dt-chip').forEach(c=>c.classList.remove('active'));
  document.querySelector('.dt-chip').classList.add('active');
  // 模板
  document.getElementById('fmTpl').innerHTML=curEvent.tpls.map(t=>`<span class="chip tpl" onclick="pickTpl(this)">${t}</span>`).join('');
  renderSelPills();
  document.getElementById('formOverlay').classList.add('show');
  document.getElementById('formSheet').classList.add('show');
}

function closeForm(){
  document.getElementById('formOverlay').classList.remove('show');
  document.getElementById('formSheet').classList.remove('show');
}

function pickTpl(el){
  const ta=document.getElementById('fmNote');
  ta.value=el.textContent;
}

function setDate(offset,btn){
  document.querySelectorAll('.dt-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  const d=new Date();
  d.setDate(d.getDate()+offset);
  document.getElementById('fmDate').value=fmtDate(d);
}

function pickCustomDate(){
  document.querySelectorAll('.dt-chip').forEach(c=>c.classList.remove('active'));
  document.getElementById('fmDate').classList.add('active');
}

function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function renderSelPills(){
  const box=document.getElementById('selPills');
  const txt=document.getElementById('selCntText');
  if(!selectedSids.size){
    box.innerHTML='';
    txt.textContent='未选择';
    return;
  }
  txt.textContent=`已选 ${selectedSids.size} 人`;
  const arr=Array.from(selectedSids);
  box.innerHTML=arr.map(sid=>{
    const s=STUDENTS.find(x=>x.sid===sid);
    if(!s)return '';
    return `<span class="stu-pill"><span class="av">${s.name.slice(-1)}</span>${s.name}<span class="rm" onclick="removeStu('${sid}')">×</span></span>`;
  }).join('');
}

function removeStu(sid){selectedSids.delete(sid);renderSelPills();}

/* =========== 学生选择 二级抽屉 =========== */
function openStuPicker(){
  stuGroup='all';
  document.querySelectorAll('.grp-chip').forEach(c=>c.classList.remove('active'));
  document.querySelector('.grp-chip').classList.add('active');
  document.getElementById('stuKw').value='';
  renderStuList();
  document.getElementById('stuOverlay').classList.add('show');
  document.getElementById('stuSheet').classList.add('show');
}

function closeStuPicker(){
  document.getElementById('stuOverlay').classList.remove('show');
  document.getElementById('stuSheet').classList.remove('show');
}

function pickGroup(btn,g){
  document.querySelectorAll('.grp-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  stuGroup=g;
  renderStuList();
}

function getStuListView(){
  const kw=(document.getElementById('stuKw').value||'').trim().toLowerCase();
  let list=STUDENTS;
  if(stuGroup==='mygrp'){list=list.filter(s=>s.group==='mygrp');}
  else if(stuGroup==='recent'){
    /* 最近：取 RECORDS 中出现过的去重学号 */
    const recents=new Set();
    RECORDS.forEach(r=>r.sids.forEach(s=>recents.add(s)));
    list=list.filter(s=>recents.has(s.sid));
  }
  if(kw){list=list.filter(s=>s.name.toLowerCase().includes(kw)||s.sid.includes(kw));}
  return list;
}

function renderStuList(){
  const list=getStuListView();
  document.getElementById('stuListCnt').textContent=list.length;
  document.getElementById('stuPickedCnt').textContent=selectedSids.size;
  const allInSel=list.length&&list.every(s=>selectedSids.has(s.sid));
  document.getElementById('stuAllBtn').textContent=allInSel?'取消全选':'全选当前列表';
  const box=document.getElementById('stuList');
  if(!list.length){box.innerHTML='<div class="text-center text-xs text-gray-400 py-8">无匹配学生</div>';return;}
  box.innerHTML=list.map(s=>{
    const ck=selectedSids.has(s.sid)?'checked':'';
    return `<div class="stu-row ${ck}" onclick="toggleStu('${s.sid}')">
      <div class="av">${s.name.slice(-1)}</div>
      <div class="info">
        <div class="nm">${s.name}</div>
        <div class="sub">${s.sid} · ${s.major} · ${s.advisor}</div>
      </div>
      <div class="ck"></div>
    </div>`;
  }).join('');
}

function toggleStu(sid){
  if(selectedSids.has(sid))selectedSids.delete(sid);
  else selectedSids.add(sid);
  renderStuList();
}

function toggleSelectAllInList(){
  const list=getStuListView();
  const allInSel=list.length&&list.every(s=>selectedSids.has(s.sid));
  if(allInSel){list.forEach(s=>selectedSids.delete(s.sid));}
  else{list.forEach(s=>selectedSids.add(s.sid));}
  renderStuList();
}

function clearSelected(){selectedSids.clear();renderStuList();}

function confirmStuPick(){
  renderSelPills();
  closeStuPicker();
}

/* =========== 提交 =========== */
function submitForm(){
  if(!selectedSids.size){showToast('请先选择学生');return;}
  const date=document.getElementById('fmDate').value;
  const note=document.getElementById('fmNote').value.trim();
  const newRec={
    id:genRecId(),
    ev:curEvent.key,
    sids:Array.from(selectedSids),
    date:date,
    note:note,
    by:'王老师',
    ts:Date.now()
  };
  RECORDS.unshift(newRec);
  saveRecords();
  renderEvents();
  renderRecent();
  closeForm();
  showToast(`已提交 ${selectedSids.size} 条记录 ✓`);
}

/* =========== Toast =========== */
let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

/* =========== 初始化 =========== */
renderEvents();
renderRecent();
</script>
</body>
</html>
