  document.getElementById('aPhone').href='tel:'+stu.phone;

  document.getElementById('iSid').textContent=sid;
  document.getElementById('iGender').textContent=stu.gender;
  document.getElementById('iGrade').textContent=stu.grade;
  document.getElementById('iCollege').textContent=stu.college+'学院';
  document.getElementById('iMajor').textContent=stu.major;
  document.getElementById('iClass').textContent=stu.clazz;
  document.getElementById('iDorm').textContent=stu.dorm;
  document.getElementById('iCounselor').textContent=stu.counselor;
  document.getElementById('iPhone').textContent=stu.phone;
  document.getElementById('iFamily').textContent=stu.family;
  document.getElementById('iTags').innerHTML=stu.tags.map(t=>`<span class="px-2 py-0.5 rounded text-[11px] bg-orange-50 text-orange-600 border border-orange-100">${t}</span>`).join('');
  document.getElementById('iGpa').textContent=stu.gpa;
  document.getElementById('iRank').textContent=stu.rank;
  document.getElementById('iAttend').textContent=stu.attend;

  document.getElementById('focusBtn').textContent=stu.focus?'★ 已关注':'+ 关注';
  if(stu.focus)document.getElementById('focusBtn').classList.add('text-yellow-500');

  renderAlerts();
}

function renderAlerts(){
  let list=allAlerts.filter(a=>a.sid===sid);
  if(curMod!=='all')list=list.filter(a=>a.mod===curMod);
  const box=document.getElementById('alertHistory');
  if(!list.length){box.innerHTML='<div class="text-center text-gray-400 text-[12px] py-6">暂无该类预警记录</div>';return;}
  box.innerHTML=list.map(a=>`
    <div class="border border-gray-100 rounded-lg p-3">
      <div class="flex items-center gap-1.5 mb-1">
        <span class="px-1.5 py-0.5 rounded text-[10px] ${modColor[a.mod]}">${modLabel[a.mod]}</span>
        <span class="px-1.5 py-0.5 rounded text-[10px] text-white ${lvColor[a.level]}">${lvName[a.level]}</span>
        <span class="text-[12px] font-medium text-gray-800">${a.type}</span>
        <span class="ml-auto text-[10px] ${a.status==='done'?'text-success':'text-orange-500'}">${a.status==='done'?'已反馈':'待反馈'}</span>
      </div>
      <div class="text-[11px] text-gray-400 mb-1">${a.time}</div>
      <div class="text-[12px] text-gray-600">${a.detail}</div>
      ${a.fb?`<div class="mt-2 pt-2 border-t border-gray-50 text-[12px] text-gray-500"><span class="text-success">反馈：</span>${a.fb}</div>`:''}
    </div>
  `).join('');
}

function filterAlerts(btn,mod){
  curMod=mod;
  document.querySelectorAll('.alert-chip').forEach(b=>{b.classList.remove('bg-primary','text-white');b.classList.add('bg-gray-100','text-gray-600');});
  btn.classList.add('bg-primary','text-white');btn.classList.remove('bg-gray-100','text-gray-600');
  renderAlerts();
}

function pickTab(btn,t){
  document.querySelectorAll('.tab-line').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['Info','Alert','Track'].forEach(k=>document.getElementById('tab'+k).classList.add('hidden'));
  document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.remove('hidden');
  if(t==='track')renderTrack();
}

function renderTrack(){
  document.getElementById('tEntry').textContent='32 次';
  document.getElementById('tDorm').textContent='14 次';
  document.getElementById('tConsume').textContent='¥18.6';
  const tl=tracks[sid]||tracks['2022010101'];
  document.getElementById('timeline').innerHTML='<div class="timeline-line"></div>'+tl.map(it=>`
    <div class="relative pl-3 pb-3">
      <div class="timeline-dot"></div>
      <div class="text-[11px] text-gray-400 mb-0.5">${it.time}</div>
      <div class="text-[12px] font-medium text-gray-800 mb-0.5">${it.event}</div>
      <div class="text-[12px] text-gray-500">${it.detail}</div>
    </div>
  `).join('');
  setTimeout(()=>{
    const el=document.getElementById('trackChart');
    if(!el||!window.echarts)return;
    const c=echarts.init(el);
    c.setOption({
      grid:{left:30,right:10,top:10,bottom:20},
      tooltip:{trigger:'axis'},
      xAxis:{type:'category',data:['周一','周二','周三','周四','周五','周六','周日'],axisLine:{lineStyle:{color:'#E5E7EB'}},axisLabel:{color:'#9CA3AF',fontSize:10}},
      yAxis:{type:'value',axisLine:{show:false},axisTick:{show:false},splitLine:{lineStyle:{color:'#F3F4F6'}},axisLabel:{color:'#9CA3AF',fontSize:10}},
      series:[{type:'line',smooth:true,data:[8,7,6,5,4,3,2],lineStyle:{color:'#3087CC',width:2},itemStyle:{color:'#3087CC'},areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'rgba(48,135,204,0.3)'},{offset:1,color:'rgba(48,135,204,0)'}]}}}]
    });
  },50);
}

function toggleFocus(){
  stu.focus=!stu.focus;
  document.getElementById('focusBtn').textContent=stu.focus?'★ 已关注':'+ 关注';
  document.getElementById('focusBtn').classList.toggle('text-yellow-500',stu.focus);
}

render();
</script>

</body>
</html>
