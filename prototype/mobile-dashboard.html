function getRole() {
  var p = new URLSearchParams(window.location.search);
  var r = p.get('role');
  if (['school','college','counselor'].indexOf(r) >= 0) return r;
  return 'school';
}

function switchTab(role) {
  var url = window.location.pathname + '?role=' + role;
  window.history.replaceState(null, '', url);
  initDashboard(role);
}

function destroyCharts() {
  chartInstances.forEach(function(c) { c.dispose(); });
  chartInstances = [];
}

function makeChart(id, opt) {
  var el = document.getElementById(id);
  if (!el) return null;
  var c = echarts.init(el);
  c.setOption(opt);
  chartInstances.push(c);
  return c;
}

function genDates(n) {
  var arr = [];
  var d = new Date();
  for (var i = n - 1; i >= 0; i--) {
    var t = new Date(d);
    t.setDate(d.getDate() - i);
    arr.push((t.getMonth() + 1) + '/' + t.getDate());
  }
  return arr;
}

function levelColor(lv) {
  if (lv === 3) return { bg: 'bg-red-50', text: 'text-level3', pill: 'bg-level3' };
  if (lv === 2) return { bg: 'bg-orange-50', text: 'text-level2', pill: 'bg-level2' };
  return { bg: 'bg-blue-50', text: 'text-level1', pill: 'bg-level1' };
}

function initDashboard(role) {
  destroyCharts();
  var d = DATA[role];

  document.getElementById('roleBadge').textContent = d.badge;

  document.querySelectorAll('.tab-item').forEach(function(t) {
    t.classList.toggle('active', t.dataset.role === role);
  });

  var sb = document.getElementById('scopeBanner');
  sb.className = 'mx-4 mt-3 mb-2 px-4 py-2.5 rounded-xl text-xs text-center ' + d.scope.bg + ' ' + d.scope.text;
  sb.innerHTML = d.scope.icon + ' ' + d.scope.desc;

  var html = '';
  if (role === 'school') html = renderSchool(d);
  else if (role === 'college') html = renderCollege(d);
  else html = renderCounselor(d);

  document.getElementById('dashboardContent').innerHTML = html;
  setTimeout(function() { initCharts(role, d); }, 80);
}

/* ============ Shared Renderers ============ */

function renderOverview(items) {
  var h = '<div class="card"><div class="grid grid-cols-4 gap-2 text-center">';
  items.forEach(function(it) {
    h += '<div><div class="stat-val ' + it.c + '">' + it.v + '</div><div class="stat-label">' + it.l + '</div></div>';
  });
  h += '</div></div>';
  return h;
}

function renderLevels(levels) {
  var h = '<div class="card"><div class="card-title">\u9884\u8B66\u7B49\u7EA7\u5206\u5E03</div><div class="grid grid-cols-3 gap-3">';
  levels.forEach(function(lv) {
    h += '<div class="' + lv.bg + ' rounded-xl p-3 text-center border ' + lv.bc + ' border-opacity-30">';
    h += '<div class="text-2xl font-bold ' + lv.tc + '">' + lv.v + '</div>';
    h += '<div class="text-xs text-gray-500 mt-1">' + lv.l + '</div></div>';
  });
  h += '</div></div>';
  return h;
}

function renderRankList(title, items, showAvatar) {
  var rankColors = ['#3087CC','#006DAD','#1BB975','#F29100','#999'];
  var h = '<div class="card"><div class="card-title">' + title + '</div>';
  items.forEach(function(it, i) {
    var color = rankColors[i];
    h += '<div class="flex items-center mb-3">';
    if (showAvatar) {
      h += '<div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold mr-2.5 flex-shrink-0" style="background:' + color + '">' + it.avatar + '</div>';
    } else {
      h += '<span class="w-5 h-5 rounded-full flex items-center justify-center text-white text-xs font-bold mr-2.5 flex-shrink-0" style="background:' + color + '">' + (i + 1) + '</span>';
    }
    h += '<span class="text-sm text-gray-700 w-20 truncate">' + it.name + '</span>';
    h += '<div class="flex-1 mx-2"><div class="progress-bar"><div class="progress-fill" style="width:' + it.rate + '%;background:' + color + '"></div></div></div>';
    h += '<span class="text-sm font-semibold" style="color:' + color + '">' + it.rate + '%</span></div>';
  });
  h += '</div>';
  return h;
}

/* ============ School Dashboard ============ */

function renderSchool(d) {
  var h = renderOverview(d.overview);
  h += '<div class="card"><div class="card-title">\u5404\u5B66\u9662\u9884\u8B66\u5206\u5E03</div><div id="chartCollegeBar" style="height:250px"></div></div>';

  h += renderLevels(d.levels);
  h += renderRankList('\u53CD\u9988\u7387\u6392\u884C TOP5', d.feedbackTop, false);
  h += '<div class="card"><div class="card-title">\u8FD130\u5929\u9884\u8B66\u8D8B\u52BF</div><div id="chartTrend30" style="height:220px"></div></div>';
  return h;
}

  h += '<div class="card"><div class="card-title">\u91CD\u70B9\u5173\u6CE8\u5B66\u751F</div>';
  d.focusStudents.forEach(function(st) {
    var lc = levelColor(st.level);
    h += '<div class="flex items-center p-2.5 ' + lc.bg + ' rounded-xl mb-2">';
    h += '<div class="w-8 h-8 bg-white rounded-full flex items-center justify-center text-xs font-bold ' + lc.text + ' mr-2.5 shadow-sm">' + st.name[0] + '</div>';

    h += '<span class="level-badge text-white ' + lc.pill + '">' + st.tag + '</span></div>';

  h += '</div>';

  h += '<div class="card"><div class="card-title">\u8FD17\u5929\u5904\u7406\u8D8B\u52BF</div><div id="chartWeekBar" style="height:200px"></div></div>';

  h += '<div class="card"><div class="card-title">\u54CD\u5E94\u65F6\u6548</div>';
  h += '<div class="flex items-center justify-center mb-3"><div id="chartGauge" style="width:160px;height:130px"></div></div>';
  h += '<div class="grid grid-cols-3 gap-3 text-center">';
  h += '<div class="bg-blue-50 rounded-xl p-3"><div class="text-lg font-bold text-primary">' + d.response.avg + '</div><div class="text-xs text-gray-500 mt-0.5">\u5E73\u5747\u54CD\u5E94</div></div>';
  h += '<div class="bg-green-50 rounded-xl p-3"><div class="text-lg font-bold text-wechat">' + d.response.total + '</div><div class="text-xs text-gray-500 mt-0.5">\u672C\u6708\u5904\u7406</div></div>';
  h += '<div class="bg-orange-50 rounded-xl p-3"><div class="text-lg font-bold text-level2">' + d.response.ontime + '</div><div class="text-xs text-gray-500 mt-0.5">\u6309\u65F6\u7387</div></div>';
  h += '</div></div>';
  return h;
}

/* ============ Chart Initialization ============ */

function initCharts(role, d) {
  if (role === 'school') {
    makeChart('chartCollegeBar', {
      grid: { left: 80, right: 20, top: 8, bottom: 20 },
      xAxis: {
        type: 'value',
        axisLabel: { fontSize: 10 },
        splitLine: { lineStyle: { type: 'dashed', color: '#f0f0f0' } }
      },
      yAxis: {
        type: 'category',
        data: d.collegeBar.names.slice().reverse(),
        axisLabel: { fontSize: 11 },
        axisTick: { show: false },
        axisLine: { show: false }
      },
      series: [{
        type: 'bar',
        data: d.collegeBar.vals.slice().reverse(),
        barWidth: 14,
        itemStyle: {
          borderRadius: [0, 6, 6, 0],
          color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
            { offset: 0, color: '#3087CC' },
            { offset: 1, color: '#69C0FF' }
          ])
        },
        label: { show: true, position: 'right', fontSize: 10, color: '#666' }
      }]
    });
    initTypePie(d.typePie);
    initTrend30(d.trend30, 30);
  } else if (role === 'college') {
    makeChart('chartGradeBar', {
      grid: { left: 12, right: 12, top: 8, bottom: 30, containLabel: true },
      xAxis: {
        type: 'category',
        data: d.gradeBar.names,
        axisLabel: { fontSize: 11 },
        axisTick: { show: false },
        axisLine: { lineStyle: { color: '#eee' } }
      },
      yAxis: {
        type: 'value',
        axisLabel: { fontSize: 10 },
        splitLine: { lineStyle: { type: 'dashed', color: '#f0f0f0' } }
      },
      series: [{
        type: 'bar',
        data: d.gradeBar.vals,
        barWidth: 36,
        itemStyle: {
          borderRadius: [8, 8, 0, 0],
          color: function(p) {
            var cs = ['#3087CC','#006DAD','#1BB975','#F29100'];
            return cs[p.dataIndex % 4];
          }
        },
        label: { show: true, position: 'top', fontSize: 11, color: '#666' }
      }]
    });
    initTypePie(d.typePie);
    initTrend30(d.trend30, 30);
  } else {
    initTypePie(d.typePie);

    makeChart('chartWeekBar', {
      grid: { left: 12, right: 12, top: 36, bottom: 24, containLabel: true },
      legend: { data: ['\u65B0\u589E','\u5DF2\u5904\u7406'], top: 0, textStyle: { fontSize: 11 }, itemWidth: 12, itemHeight: 8 },
      xAxis: {
        type: 'category',
        data: d.weekBar.days,
        axisLabel: { fontSize: 11 },
        axisTick: { show: false },
        axisLine: { lineStyle: { color: '#eee' } }
      },
      yAxis: {
        type: 'value',
        axisLabel: { fontSize: 10 },
        splitLine: { lineStyle: { type: 'dashed', color: '#f0f0f0' } }
      },
      series: [
        {
          name: '\u65B0\u589E', type: 'bar', data: d.weekBar.newArr, barWidth: 16,
          itemStyle: { borderRadius: [6, 6, 0, 0], color: '#F29100' }
        },
        {
          name: '\u5DF2\u5904\u7406', type: 'bar', data: d.weekBar.doneArr, barWidth: 16,
          itemStyle: { borderRadius: [6, 6, 0, 0], color: '#1BB975' }
        }
      ]
    });

    makeChart('chartGauge', {
      series: [{
        type: 'gauge', radius: '90%', startAngle: 210, endAngle: -30, min: 0, max: 100,
        axisLine: { lineStyle: { width: 12, color: [[0.6,'#1BB975'],[0.8,'#F29100'],[1,'#DF2027']] } },
        pointer: { length: '60%', width: 4, itemStyle: { color: '#333' } },
        axisTick: { show: false },
        axisLabel: { show: false },
        splitLine: { show: false },
        title: { show: false },
        detail: {
          valueAnimation: true,
          formatter: '{value}%',
          fontSize: 16, fontWeight: 'bold',
          offsetCenter: [0, '70%'],
          color: '#333'
        },
        data: [{ value: 92 }]
      }]
    });
  }
}

function initTypePie(items) {
  makeChart('chartTypePie', {
    legend: { bottom: 4, itemWidth: 10, itemHeight: 10, textStyle: { fontSize: 11 }, itemGap: 16 },
    series: [{
      type: 'pie',
      radius: ['42%', '68%'],
      center: ['50%', '44%'],
      label: { show: true, formatter: '{b}\n{d}%', fontSize: 10, lineHeight: 14 },
      labelLine: { length: 8, length2: 12 },
      data: items.map(function(it) {
        return { name: it.name, value: it.value, itemStyle: { color: it.color } };
      }),
      emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,.15)' } }
    }]
  });
}

function initTrend30(trend, days) {
  var dates = genDates(days);
  makeChart('chartTrend30', {
    grid: { left: 8, right: 8, top: 36, bottom: 24, containLabel: true },
    legend: { data: ['\u65B0\u589E\u9884\u8B66','\u5DF2\u5904\u7406\u9884\u8B66'], top: 0, textStyle: { fontSize: 11 }, itemWidth: 16, itemHeight: 3 },
    xAxis: {
      type: 'category', data: dates, boundaryGap: false,
      axisLabel: { fontSize: 9, interval: 6 },
      axisTick: { show: false },
      axisLine: { lineStyle: { color: '#eee' } }
    },
    yAxis: {
      type: 'value',
      axisLabel: { fontSize: 10 },
      splitLine: { lineStyle: { type: 'dashed', color: '#f0f0f0' } }
    },
    series: [
      {
        name: '\u65B0\u589E\u9884\u8B66', type: 'line', data: trend.newArr, smooth: true, symbol: 'none',
        lineStyle: { width: 2, color: '#FF7A45' },
        areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: 'rgba(255,122,69,.25)' },
          { offset: 1, color: 'rgba(255,122,69,.02)' }
        ])}
      },
      {
        name: '\u5DF2\u5904\u7406\u9884\u8B66', type: 'line', data: trend.doneArr, smooth: true, symbol: 'none',
        lineStyle: { width: 2, color: '#3087CC' },
        areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: 'rgba(24,144,255,.2)' },
          { offset: 1, color: 'rgba(24,144,255,.02)' }
        ])}
      }
    ],
    tooltip: { trigger: 'axis', textStyle: { fontSize: 11 } }
  });
}

window.addEventListener('resize', function() {
  chartInstances.forEach(function(c) { c.resize(); });
});

initDashboard(getRole());
</script>
