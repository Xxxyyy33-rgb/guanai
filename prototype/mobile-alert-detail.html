<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>预警详情 - 知行护航工程</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#3087CC','primary-light':'#E3F1F9','primary-dark':'#006DAD',brand:'#DF2027',level1:'#3087CC',level2:'#F29100',level3:'#DF2027',success:'#1BB975',warning:'#F29100',danger:'#DF2027',ai:'#7C3AED','ai-light':'#A78BFA',wechat:'#07C160'},fontFamily:{sans:['OPPOSans','-apple-system','PingFang SC','Microsoft YaHei','sans-serif']}}}}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/npm/cn-fontsource-oppo-sans-3@1.0.5/index.min.css" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<style>
body{max-width:375px;margin:0 auto;background:#f5f5f5;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:70;}
.sheet-overlay.show{display:block;}
.sheet-body{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:375px;background:#fff;border-radius:16px 16px 0 0;padding:16px;z-index:71;transition:transform .3s ease;}
.sheet-body.show{transform:translateX(-50%) translateY(0);}
.wl-quick.active{background:#E3F1F9;border-color:#3087CC;color:#006DAD;}
.tpl-chip{padding:6px 12px;border:1px solid #E5E7EB;border-radius:999px;font-size:12px;color:#4B5563;background:#F9FAFB;cursor:pointer;}
.tpl-chip.active{background:#EFF6FF;border-color:#3087CC;color:#3087CC;}
</style>
</head>
<body class="pb-24">

<!-- Top Navigation Bar -->
<div class="bg-white sticky top-0 z-40 border-b border-gray-100">
  <div class="flex items-center justify-between px-4 py-3">
    <a href="mobile-alert-process.html" class="text-gray-600"><svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg></a>
    <h1 class="text-base font-semibold text-gray-800">预警详情</h1>
    <div class="w-6"></div>
  </div>
</div>

<!-- 本次预警卡片 -->
<div class="mx-4 mt-3 bg-white rounded-2xl shadow-sm overflow-hidden">
  <div class="px-4 py-3 border-b border-gray-50 flex items-center justify-between">
    <span class="text-sm font-semibold text-gray-800">本次预警</span>
    <span id="statusBadge"></span>
  </div>
  <div class="p-4">
    <div class="flex items-center gap-2 mb-2">
      <span id="modBadge" class="px-2 py-0.5 rounded text-xs"></span>
      <span id="lvBadge" class="px-2 py-0.5 rounded text-xs text-white"></span>
      <span id="alertType" class="text-sm font-semibold text-gray-800"></span>
    </div>
    <div class="text-[12px] text-gray-400 mb-3" id="alertTime"></div>
    <div class="text-[13px] text-gray-700 leading-relaxed rounded-lg bg-gray-50 p-3" id="alertDetail"></div>
  </div>
</div>

<!-- 学生基本信息卡片 -->
<div class="mx-4 mt-3 bg-white rounded-2xl shadow-sm overflow-hidden">
  <div class="px-4 py-3 border-b border-gray-50 flex items-center justify-between">
    <span class="text-sm font-semibold text-gray-800">学生基本信息</span>
    <a id="toProfile" href="mobile-search.html" class="text-xs text-primary">查看完整画像 →</a>
  </div>
  <div class="p-4">
    <div class="flex items-center mb-3">
      <div id="avatar" class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center text-primary font-bold text-lg flex-shrink-0"></div>
      <div class="ml-3 flex-1 min-w-0">
        <div class="flex items-center">
          <span id="stuName" class="text-base font-semibold text-gray-800"></span>
          <span id="stuGender" class="ml-1.5 text-xs text-gray-400"></span>
        </div>
        <div class="text-xs text-gray-400 mt-0.5" id="stuSid"></div>
      </div>
      <div class="flex gap-2 flex-shrink-0">
        <a id="callStudent" href="tel:13800000000" class="w-8 h-8 rounded-full bg-green-50 flex items-center justify-center">
          <svg class="w-4 h-4 text-green-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.105c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/></svg>
        </a>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-y-2 gap-x-4 text-xs pt-3 border-t border-gray-100">
      <div><span class="text-gray-400">学院</span><div class="text-gray-800 mt-0.5" id="stuCollege"></div></div>
      <div><span class="text-gray-400">专业</span><div class="text-gray-800 mt-0.5" id="stuMajor"></div></div>
      <div><span class="text-gray-400">年级</span><div class="text-gray-800 mt-0.5" id="stuGrade"></div></div>
      <div><span class="text-gray-400">宿舍</span><div class="text-gray-800 mt-0.5" id="stuDorm"></div></div>
      <div><span class="text-gray-400">辅导员</span><div class="text-gray-800 mt-0.5">王老师</div></div>
      <div><span class="text-gray-400">家长电话</span><div class="text-gray-800 mt-0.5">139****1234</div></div>
    </div>
  </div>
</div>

<!-- 该学生其他预警 -->
<div class="mx-4 mt-3 bg-white rounded-2xl shadow-sm overflow-hidden">
  <div class="px-4 py-3 border-b border-gray-50 flex items-center justify-between">
    <span class="text-sm font-semibold text-gray-800">该学生的其他预警</span>
    <span class="text-xs text-gray-400"><span id="otherCount" class="text-primary font-medium">—</span> 条</span>
  </div>
  <div class="p-4 space-y-2" id="otherList"></div>
</div>

<!-- Action Buttons -->
<div id="actionBar" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[375px] bg-white border-t border-gray-100 px-4 py-3 flex z-40">
  <button onclick="openFeedbackSheet()" class="flex-1 bg-primary text-white text-sm font-medium py-3 rounded-xl active:opacity-80">发起反馈</button>
</div>

<!-- Feedback Sheet（含 "正常反馈结案 / 系统误报" 二选一，与批量反馈一致） -->
<div class="sheet-overlay" id="fbOverlay" onclick="closeFeedbackSheet()"></div>
<div class="sheet-body" id="fbSheet">
  <div class="flex items-center justify-between mb-2">
    <span class="text-base font-semibold text-gray-800">发起反馈</span>
    <button onclick="closeFeedbackSheet()" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100"><svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
  </div>
  <div class="text-xs text-gray-500 mb-3">请按所选结论填写反馈内容，提交后将完成本条预警的闭环。</div>

  <div class="text-xs font-medium text-gray-700 mb-2">办理结论</div>
  <div class="flex gap-2 mb-3">
    <button type="button" onclick="setConclusion('normal')" id="cNormal" class="flex-1 py-2 rounded-lg border-2 border-primary bg-primary/5 text-primary text-xs font-medium">正常反馈结案</button>
    <button type="button" onclick="setConclusion('false')" id="cFalse" class="flex-1 py-2 rounded-lg border border-gray-200 text-gray-600 text-xs">系统误报</button>
  </div>

  <div class="text-xs text-gray-500 mb-2" id="tplLabel">处置说明模板</div>
  <div class="flex flex-wrap gap-2 mb-3" id="fbChips"></div>
  <textarea id="fbContent" rows="4" placeholder="请填写反馈说明（≥10 字）" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-primary resize-none"></textarea>

  <!-- 白名单设置 -->
  <div class="mt-4 rounded-xl border border-gray-200 bg-gray-50/60">
    <label class="flex items-start gap-2 px-3 py-3 cursor-pointer">
      <input type="checkbox" id="wlToggle" onchange="toggleWhitelist()" class="mt-0.5 w-4 h-4 accent-primary">
      <div class="flex-1 min-w-0">
        <div class="text-sm font-medium text-gray-800 flex items-center gap-1.5">
          <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          加入白名单
        </div>
        <div class="text-[11px] text-gray-500 mt-0.5">在所设日期段内，该学生<span id="wlAlertType" class="text-gray-700">此类</span>预警将不再推送</div>
      </div>
    </label>
    <div id="wlPanel" class="hidden border-t border-gray-200 px-3 py-3 space-y-2.5">
      <div class="flex items-center gap-2">
        <span class="text-xs text-gray-500 w-12 flex-shrink-0">开始</span>
        <input type="date" id="wlStart" class="flex-1 text-xs border border-gray-200 rounded-lg px-2 py-2 text-gray-700 bg-white focus:outline-none focus:border-primary">
      </div>
      <div class="flex items-center gap-2">
        <span class="text-xs text-gray-500 w-12 flex-shrink-0">结束</span>
        <input type="date" id="wlEnd" class="flex-1 text-xs border border-gray-200 rounded-lg px-2 py-2 text-gray-700 bg-white focus:outline-none focus:border-primary">
      </div>
      <div class="flex flex-wrap gap-2 pt-1">
        <span class="text-[11px] text-gray-500 mr-1 leading-6">快捷：</span>
        <button type="button" onclick="setWlDuration(7)" class="wl-quick px-2.5 py-1 rounded-full text-[11px] border border-gray-200 text-gray-600 bg-white">7 天</button>
        <button type="button" onclick="setWlDuration(14)" class="wl-quick px-2.5 py-1 rounded-full text-[11px] border border-gray-200 text-gray-600 bg-white">14 天</button>
        <button type="button" onclick="setWlDuration(30)" class="wl-quick px-2.5 py-1 rounded-full text-[11px] border border-gray-200 text-gray-600 bg-white">30 天</button>
        <button type="button" onclick="setWlDuration(90)" class="wl-quick px-2.5 py-1 rounded-full text-[11px] border border-gray-200 text-gray-600 bg-white">本学期</button>
      </div>
      <div class="flex items-start gap-1.5 text-[11px] text-orange-600 bg-orange-50 border border-orange-100 rounded-lg px-2 py-1.5">
        <svg class="w-3.5 h-3.5 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>
        <span>白名单仅屏蔽推送，不影响数据采集，到期自动失效。如需提前移除，可在「我的白名单」中操作。</span>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-2 gap-3 mt-3">
    <button onclick="closeFeedbackSheet()" class="py-2.5 border border-gray-200 text-gray-600 text-sm rounded-xl">取消</button>
    <button onclick="submitFeedback()" class="py-2.5 bg-primary text-white text-sm rounded-xl">提交</button>
  </div>
</div>

<script>
const ALERTS={
  '1':{id:1,name:'张三',gender:'男',sid:'2022010101',college:'计算机学院',major:'计算机科学与技术',grade:'2022级',dorm:'升华七栋608',mod:'late',type:'未归预警',level:3,time:'2026-04-25 08:30',detail:'连续 2 天未归宿舍，且昨日未出现在课堂。门禁最后刷卡时间：04-22 18:40。',status:'pending'},
  '2':{id:2,name:'王五',gender:'男',sid:'2022010215',college:'经济学院',major:'金融学',grade:'2022级',dorm:'德馨三栋215',mod:'consume',type:'月消费过低预警',level:2,time:'2026-04-25 07:20',detail:'近 15 天日均消费 5 元，连续 3 天零消费，食堂/超市均无刷卡记录。',status:'pending'},
  '3':{id:3,name:'李明',gender:'男',sid:'2022010312',college:'计算机学院',major:'软件工程',grade:'2022级',dorm:'南七栋608',mod:'late',type:'晚归预警',level:1,time:'2026-04-24 23:30',detail:'23:30 刷卡进入南 7-608 · 本月第 3 次晚归。',status:'pending'},
  '4':{id:4,name:'马强',gender:'男',sid:'2022010099',college:'电子信息学院',major:'电子信息工程',grade:'2022级',dorm:'升华九栋403',mod:'addict',type:'心理测评异常预警',level:2,time:'2026-04-24 19:50',detail:'PHQ-9 得分 18，抑郁倾向连续 8 天；近 7 日论坛/邮件中抑郁词触发 12 次。',status:'pending'},
  '5':{id:5,name:'刘芳',gender:'女',sid:'2023020018',college:'材料学院',major:'材料科学与工程',grade:'2023级',dorm:'芷兰四栋312',mod:'study',type:'旷课预警',level:2,time:'2026-04-24 09:30',detail:'材料力学连续旷课 3 天，本学期累计缺勤 12 次。',status:'pending'},
  '6':{id:6,name:'赵六',gender:'男',sid:'2023040112',college:'交通运输工程学院',major:'交通工程',grade:'2023级',dorm:'升华八栋521',mod:'late',type:'未归预警',level:2,time:'2026-04-23 22:15',detail:'未归预警从一级升级为二级，连续 4 天晚归记录。',status:'pending'},
  '7':{id:7,name:'刘琴',gender:'女',sid:'2024050118',college:'商学院',major:'工商管理',grade:'2024级',dorm:'芷兰二栋205',mod:'consume',type:'餐补消费异常预警',level:1,time:'2026-04-23 15:40',detail:'近 30 日消费较上学期骤降 60%，疑似家庭变故，请暖心了解。',status:'pending'},
};

const modMeta={
  late:{label:'行为护航',cls:'bg-orange-50 text-orange-600 border border-orange-100'},
  study:{label:'学业护航',cls:'bg-green-50 text-green-700 border border-green-100'},
  addict:{label:'心理护航',cls:'bg-purple-50 text-purple-700 border border-purple-100'},
  consume:{label:'经济护航',cls:'bg-red-50 text-red-600 border border-red-100'}
};
const lvMeta={1:{text:'一级',cls:'bg-blue-400'},2:{text:'二级',cls:'bg-orange-400'},3:{text:'三级',cls:'bg-red-500'}};

function getAlert(){
  const u=new URLSearchParams(location.search);
  const id=u.get('id')||'1';
  return ALERTS[id]||ALERTS['1'];
}

function renderOther(current){
  const list=Object.values(ALERTS).filter(a=>a.sid===current.sid&&a.id!==current.id);
  // 模拟同学生多条：扩充示例
  const mock=[
    {mod:'late',type:'晚归预警',level:1,time:'2026-03-28 23:08',status:'done'},
    {mod:'study',type:'作业提交异常',level:1,time:'2026-03-15 21:30',status:'done'}
  ];
  const final=list.length?list:mock;
  document.getElementById('otherCount').textContent=final.length;
  document.getElementById('otherList').innerHTML=final.length?final.map(a=>{
    const mm=modMeta[a.mod];
    const lm=lvMeta[a.level];
    const sb=a.status==='pending'
      ?'<span class="px-1.5 py-0.5 rounded text-[10px] bg-red-50 text-red-600 border border-red-100">未反馈</span>'
      :'<span class="px-1.5 py-0.5 rounded text-[10px] bg-green-50 text-green-600 border border-green-100">已反馈</span>';
    return `<div class="flex items-center justify-between text-[12px]">
      <div class="flex items-center gap-1.5 min-w-0">
        <span class="px-1.5 py-0.5 rounded text-[10px] ${mm.cls}">${mm.label}</span>
        <span class="px-1 py-0.5 rounded text-[10px] text-white ${lm.cls}">${lm.text}</span>
        <span class="text-gray-700 truncate">${a.type}</span>
      </div>
      <div class="flex items-center gap-2 flex-shrink-0">
        ${sb}
        <span class="text-gray-400">${a.time.slice(5,10)}</span>
      </div>
    </div>`;
  }).join(''):'<div class="text-center text-gray-400 text-xs py-3">暂无其他预警</div>';
}

function render(){
  const d=getAlert();
  const mm=modMeta[d.mod];
  const lm=lvMeta[d.level];
  document.getElementById('statusBadge').innerHTML=d.status==='pending'
    ?'<span class="px-2 py-0.5 rounded-full text-[11px] bg-red-50 text-red-600 border border-red-100">未反馈</span>'
    :'<span class="px-2 py-0.5 rounded-full text-[11px] bg-green-50 text-green-600 border border-green-100">已反馈</span>';
  document.getElementById('modBadge').className=`px-2 py-0.5 rounded text-xs ${mm.cls}`;
  document.getElementById('modBadge').textContent=mm.label;
  document.getElementById('lvBadge').className=`px-2 py-0.5 rounded text-xs text-white ${lm.cls}`;
  document.getElementById('lvBadge').textContent=lm.text;
  document.getElementById('alertType').textContent=d.type;
  document.getElementById('alertTime').textContent='触发时间：'+d.time;
  document.getElementById('alertDetail').textContent=d.detail;

  document.getElementById('avatar').textContent=d.name.charAt(0);
  document.getElementById('stuName').textContent=d.name;
  document.getElementById('stuGender').textContent=d.gender;
  document.getElementById('stuSid').textContent=d.sid;
  document.getElementById('stuCollege').textContent=d.college;
  document.getElementById('stuMajor').textContent=d.major;
  document.getElementById('stuGrade').textContent=d.grade;
  document.getElementById('stuDorm').textContent=d.dorm;
  document.getElementById('toProfile').href='mobile-search.html?sid='+d.sid;

  if(d.status==='done'){
    document.getElementById('actionBar').style.display='none';
    document.body.classList.remove('pb-24');document.body.classList.add('pb-4');
  }

  renderOther(d);
}

const tplNormal=['已电话沟通，学生说明情况','已面谈核实，已提醒注意','已联系家长知情','学生已请假（导师证明）','学生在实验室 / 外出实习'];
const tplFalse=['数据未同步（已请假未入库）','门禁识别错误','一卡通延迟 / 异常','规则阈值不适用本情况','学生已毕业 / 转专业'];
let conclusion='normal';

function pickTpl(el){
  document.getElementById('fbContent').value=el.textContent;
  document.querySelectorAll('#fbChips .tpl-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
}

function setConclusion(kind){
  conclusion=kind;
  const cn=document.getElementById('cNormal');
  const cf=document.getElementById('cFalse');
  cn.className=kind==='normal'?'flex-1 py-2 rounded-lg border-2 border-primary bg-primary/5 text-primary text-xs font-medium':'flex-1 py-2 rounded-lg border border-gray-200 text-gray-600 text-xs';
  cf.className=kind==='false'?'flex-1 py-2 rounded-lg border-2 border-primary bg-primary/5 text-primary text-xs font-medium':'flex-1 py-2 rounded-lg border border-gray-200 text-gray-600 text-xs';
  document.getElementById('tplLabel').textContent=kind==='false'?'误报原因模板':'处置说明模板';
  const tpl=kind==='false'?tplFalse:tplNormal;
  document.getElementById('fbChips').innerHTML=tpl.map(t=>`<span class="tpl-chip" onclick="pickTpl(this)">${t}</span>`).join('');
  document.getElementById('fbContent').value='';
  document.getElementById('fbContent').placeholder=kind==='false'?'请说明判定为系统误报的原因（≥10 字，用于优化模型）':'请填写反馈说明（≥10 字）';
}

function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function toggleWhitelist(){
  const on=document.getElementById('wlToggle').checked;
  document.getElementById('wlPanel').classList.toggle('hidden',!on);
  if(on){
    const s=document.getElementById('wlStart');
    const e=document.getElementById('wlEnd');
    if(!s.value){
      const today=new Date();
      const end=new Date(today.getTime()+14*86400000);
      s.value=fmtDate(today);
      e.value=fmtDate(end);
      markQuick(14);
    }
  }
}

function markQuick(days){
  document.querySelectorAll('.wl-quick').forEach(b=>b.classList.remove('active'));
  const map={7:0,14:1,30:2,90:3};
  if(days in map){
    const btns=document.querySelectorAll('.wl-quick');
    if(btns[map[days]])btns[map[days]].classList.add('active');
  }
}

function setWlDuration(days){
  const today=new Date();
  const end=new Date(today.getTime()+days*86400000);
  document.getElementById('wlStart').value=fmtDate(today);
  document.getElementById('wlEnd').value=fmtDate(end);
  markQuick(days);
}

function openFeedbackSheet(){
  setConclusion('normal');
  // 重置白名单设置
  const wl=document.getElementById('wlToggle');
  if(wl){wl.checked=false;}
  document.getElementById('wlPanel').classList.add('hidden');
  document.getElementById('wlStart').value='';
  document.getElementById('wlEnd').value='';
  document.querySelectorAll('.wl-quick').forEach(b=>b.classList.remove('active'));
  // 同步预警类型至白名单提示文案
  const cur=getAlert();
  const wlType=document.getElementById('wlAlertType');
  if(wlType&&cur&&cur.type){wlType.textContent='「'+cur.type+'」';}
  document.getElementById('fbOverlay').classList.add('show');
  document.getElementById('fbSheet').classList.add('show');
}
function closeFeedbackSheet(){document.getElementById('fbOverlay').classList.remove('show');document.getElementById('fbSheet').classList.remove('show');}
function submitFeedback(){
  const v=document.getElementById('fbContent').value.trim();
  if(v.length<10){alert(conclusion==='false'?'误报说明至少 10 字':'反馈内容至少 10 字');return;}
  let wlMsg='';
  if(document.getElementById('wlToggle').checked){
    const s=document.getElementById('wlStart').value;
    const e=document.getElementById('wlEnd').value;
    if(!s||!e){alert('请选择白名单的开始与结束日期');return;}
    if(s>e){alert('白名单结束日期不能早于开始日期');return;}
    const cur=getAlert();
    wlMsg='\n已加入白名单：'+s+' ~ '+e+'\n该学生「'+cur.type+'」期间不再推送';
  }
  alert((conclusion==='false'?'已标记为系统误报 ✓':'反馈已提交 ✓')+wlMsg);
  closeFeedbackSheet();
  location.href='mobile-alert-process.html';
}

render();
</script>
