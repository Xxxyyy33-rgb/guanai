<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>预警列表 - 知行护航工程</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#3087CC','primary-light':'#E3F1F9','primary-dark':'#006DAD',brand:'#DF2027',level1:'#3087CC',level2:'#F29100',level3:'#DF2027',success:'#1BB975',warning:'#F29100',danger:'#DF2027',ai:'#7C3AED','ai-light':'#A78BFA',wechat:'#07C160'},fontFamily:{sans:['OPPOSans','-apple-system','PingFang SC','Microsoft YaHei','sans-serif']}}}}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/npm/cn-fontsource-oppo-sans-3@1.0.5/index.min.css" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<style>body{max-width:375px;margin:0 auto;background:#f5f5f5;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}</style>
</head>
<body class="pb-16">
<div class="bg-white sticky top-0 z-40 border-b border-gray-100">
  <div class="flex items-center justify-between px-4 py-3">
    <a href="mobile-home.html" class="text-gray-600"><svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg></a>
    <h1 class="text-base font-semibold text-gray-800">预警列表</h1>
    <div class="w-6"></div>
  </div>
  <div class="flex border-b border-gray-100 px-2">
    <button onclick="filterAlerts(this,'all')" class="alert-tab flex-1 py-2.5 text-sm font-medium text-primary border-b-2 border-primary">全部</button>
    <button onclick="filterAlerts(this,'pending')" class="alert-tab flex-1 py-2.5 text-sm text-gray-500 border-b-2 border-transparent">未反馈<span class="ml-1 text-xs bg-red-500 text-white rounded-full px-1.5 py-0.5">7</span></button>
    <button onclick="filterAlerts(this,'done')" class="alert-tab flex-1 py-2.5 text-sm text-gray-500 border-b-2 border-transparent">已反馈</button>
  </div>
  <!-- 二级筛选 -->
  <div class="flex items-center gap-2 px-4 py-2 overflow-x-auto text-xs" id="levelBar">
    <button onclick="filterLevel(this,'')" class="lv-chip px-2.5 py-1 rounded-full bg-primary text-white whitespace-nowrap">全部等级</button>
    <button onclick="filterLevel(this,'1')" class="lv-chip px-2.5 py-1 rounded-full bg-gray-100 text-gray-600 whitespace-nowrap">一级</button>
    <button onclick="filterLevel(this,'2')" class="lv-chip px-2.5 py-1 rounded-full bg-gray-100 text-gray-600 whitespace-nowrap">二级</button>
    <button onclick="filterLevel(this,'3')" class="lv-chip px-2.5 py-1 rounded-full bg-gray-100 text-gray-600 whitespace-nowrap">三级</button>
    <span class="text-gray-200">|</span>
    <button onclick="filterModule(this,'')" class="mod-chip px-2.5 py-1 rounded-full bg-primary text-white whitespace-nowrap">全部类型</button>
    <button onclick="filterModule(this,'late')" class="mod-chip px-2.5 py-1 rounded-full bg-gray-100 text-gray-600 whitespace-nowrap">行为</button>
    <button onclick="filterModule(this,'study')" class="mod-chip px-2.5 py-1 rounded-full bg-gray-100 text-gray-600 whitespace-nowrap">学业</button>
    <button onclick="filterModule(this,'addict')" class="mod-chip px-2.5 py-1 rounded-full bg-gray-100 text-gray-600 whitespace-nowrap">心理</button>
    <button onclick="filterModule(this,'consume')" class="mod-chip px-2.5 py-1 rounded-full bg-gray-100 text-gray-600 whitespace-nowrap">经济</button>
  </div>
</div>

<div class="px-4 pt-3 space-y-2.5" id="alertList"></div>

<!-- Bottom Tab Bar -->
<nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[375px] bg-white border-t border-gray-200 flex items-center justify-around py-1.5 z-50">
  <a href="mobile-home.html" class="flex flex-col items-center py-1">
    <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
    <span class="text-xs text-gray-400 mt-0.5">首页</span>
  </a>
  <a href="mobile-alert-process.html" class="flex flex-col items-center py-1 relative">
    <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25z"/></svg>
    <span class="absolute -top-0.5 right-1 w-4 h-4 bg-red-500 text-white text-[9px] rounded-full flex items-center justify-center">7</span>
    <span class="text-xs text-gray-400 mt-0.5">办理</span>
  </a>
  <a href="mobile-students.html" class="flex flex-col items-center py-1">
    <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>
    <span class="text-xs text-gray-400 mt-0.5">学生</span>
  </a>
  <a href="mobile-workbench.html" class="flex flex-col items-center py-1">
    <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
    <span class="text-xs text-gray-400 mt-0.5">我的</span>
  </a>
</nav>

<script>
const alerts=[
  {id:1,name:'张三',sid:'2022010101',mod:'late',type:'未归预警',level:3,time:'2026-04-25 08:30',detail:'连续 2 天未归宿舍，且昨日未出现在课堂',status:'pending'},
  {id:2,name:'王五',sid:'2022010215',mod:'consume',type:'月消费过低预警',level:2,time:'2026-04-25 07:20',detail:'连续 3 天零消费 · 日均 < 5 元',status:'pending'},
  {id:3,name:'李明',sid:'2022010312',mod:'late',type:'晚归预警',level:1,time:'2026-04-24 23:30',detail:'23:30 进入南 7-608 · 本月第 3 次晚归',status:'pending'},
  {id:4,name:'马强',sid:'2022010099',mod:'addict',type:'心理测评异常预警',level:2,time:'2026-04-24 19:50',detail:'PHQ-9 得分 18，抑郁倾向连续 8 天',status:'pending'},
  {id:5,name:'刘芳',sid:'2023020018',mod:'study',type:'旷课预警',level:2,time:'2026-04-24 09:30',detail:'材料力学连续旷课 3 天',status:'pending'},
  {id:6,name:'赵六',sid:'2023040112',mod:'late',type:'未归预警',level:2,time:'2026-04-23 22:15',detail:'未归预警从一级升级为二级',status:'pending'},
  {id:7,name:'刘琴',sid:'2024050118',mod:'consume',type:'餐补消费异常预警',level:1,time:'2026-04-23 15:40',detail:'消费骤降 60%，疑似家庭变故',status:'pending'},
  {id:8,name:'陈晨',sid:'2022020045',mod:'study',type:'挂科预警',level:2,time:'2026-04-22 16:10',detail:'2 门核心课程成绩 < 60',status:'done',feedback:'已谈话，学生已制定补习计划',ftime:'2026-04-23 10:20'},
  {id:9,name:'孙悦',sid:'2023030067',mod:'late',type:'通宵预警',level:1,time:'2026-04-22 06:00',detail:'凌晨 2:00-6:00 无宿舍门禁记录',status:'done',feedback:'与学生父母沟通确认在家',ftime:'2026-04-22 14:30'},
  {id:10,name:'周磊',sid:'2022040023',mod:'addict',type:'日均上网时长预警',level:1,time:'2026-04-21 23:00',detail:'日均上网 > 10h，连续 5 天',status:'done',feedback:'已沟通并引导合理安排作息',ftime:'2026-04-22 09:00'},
  {id:11,name:'钱康',sid:'2022050199',mod:'late',type:'晚归预警',level:1,time:'2026-04-20 23:45',detail:'23:45 返回宿舍',status:'done',feedback:'系统误报：实际为课题组加班',ftime:'2026-04-21 08:15',isFalse:true},
];

const modLabel={late:'行为',study:'学业',addict:'心理',consume:'经济'};
const modColor={late:'bg-orange-50 text-orange-600',study:'bg-green-50 text-green-700',addict:'bg-purple-50 text-purple-700',consume:'bg-red-50 text-red-600'};
const lvColor={1:'bg-blue-400',2:'bg-orange-400',3:'bg-red-500'};
const lvName={1:'一级',2:'二级',3:'三级'};

let curTab='all',curLevel='',curMod='';

function renderAlerts(){
  let list=alerts;
  if(curTab==='pending')list=list.filter(a=>a.status==='pending');
  else if(curTab==='done')list=list.filter(a=>a.status==='done');
  if(curLevel)list=list.filter(a=>String(a.level)===curLevel);
  if(curMod)list=list.filter(a=>a.mod===curMod);
  const box=document.getElementById('alertList');
  if(!list.length){box.innerHTML='<div class="text-center text-gray-400 text-sm py-12">暂无预警</div>';return;}
  box.innerHTML=list.map(a=>{
    const statusBadge=a.status==='pending'
      ?'<span class="px-1.5 py-0.5 rounded text-[10px] bg-red-50 text-red-600 border border-red-100">未反馈</span>'
      :(a.isFalse
        ?'<span class="px-1.5 py-0.5 rounded text-[10px] bg-gray-50 text-gray-500 border border-gray-200">系统误报</span>'
        :'<span class="px-1.5 py-0.5 rounded text-[10px] bg-green-50 text-green-600 border border-green-100">已反馈</span>');
    const fbBlock=a.status==='done'?`<div class="mt-2 pt-2 border-t border-gray-100 text-[11px] text-gray-500"><span class="${a.isFalse?'text-gray-500':'text-green-600'} mr-1">${a.isFalse?'误报说明：':'反馈：'}</span>${a.feedback}<div class="text-[10px] text-gray-400 mt-0.5">${a.ftime}</div></div>`:'';
    return `<a href="mobile-alert-detail.html?id=${a.id}" class="block bg-white rounded-xl p-3 shadow-sm">
      <div class="flex items-start justify-between mb-1.5">
        <div class="flex items-center min-w-0">
          <span class="text-sm font-semibold text-gray-800 truncate">${a.name}</span>
          <span class="ml-1.5 text-[11px] text-gray-400">${a.sid}</span>
        </div>
        <div class="flex items-center gap-1 flex-shrink-0">
          <span class="px-1.5 py-0.5 rounded text-[10px] text-white ${lvColor[a.level]}">${lvName[a.level]}</span>
          ${statusBadge}
        </div>
      </div>
      <div class="flex items-center gap-1.5 mb-1">
        <span class="px-1.5 py-0.5 rounded text-[10px] ${modColor[a.mod]}">${modLabel[a.mod]}</span>
        <span class="text-[12px] font-medium text-gray-700">${a.type}</span>
      </div>
      <div class="flex items-center justify-between text-[11px] text-gray-400 mb-1">
        <span>${a.time}</span>
      </div>
      <div class="text-[12px] text-gray-600 leading-snug">${a.detail}</div>
      ${fbBlock}
    </a>`;
  }).join('');
}

function filterAlerts(btn,tab){
  curTab=tab;
  document.querySelectorAll('.alert-tab').forEach(b=>{b.classList.remove('text-primary','border-primary','font-medium');b.classList.add('text-gray-500','border-transparent');});
  btn.classList.remove('text-gray-500','border-transparent');btn.classList.add('text-primary','border-primary','font-medium');
  renderAlerts();
}
function filterLevel(btn,lv){
  curLevel=lv;
  document.querySelectorAll('.lv-chip').forEach(b=>{b.classList.remove('bg-primary','text-white');b.classList.add('bg-gray-100','text-gray-600');});
  btn.classList.remove('bg-gray-100','text-gray-600');btn.classList.add('bg-primary','text-white');
  renderAlerts();
}
function filterModule(btn,mod){
  curMod=mod;
  document.querySelectorAll('.mod-chip').forEach(b=>{b.classList.remove('bg-primary','text-white');b.classList.add('bg-gray-100','text-gray-600');});
  btn.classList.remove('bg-gray-100','text-gray-600');btn.classList.add('bg-primary','text-white');
  renderAlerts();
}

// 支持从 URL 指定初始 tab
(function(){
  const u=new URLSearchParams(location.search);
  const t=u.get('tab');
  if(t==='pending'||t==='done'){
    const btn=document.querySelectorAll('.alert-tab')[t==='pending'?1:2];
    if(btn)filterAlerts(btn,t);
    return;
  }
  renderAlerts();
})();
</script>

<!-- Floating AI Ball -->
<a href="mobile-ai-chat.html" class="fixed bottom-20 right-3 w-14 h-14 rounded-full shadow-xl flex items-center justify-center z-40" style="background:linear-gradient(135deg,#7C3AED 0%,#A78BFA 100%);box-shadow:0 8px 24px rgba(124,58,237,.4);" title="AI 智能助手">
  <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l2.09 6.26L20 9l-5 4.87L16.18 21 12 17.77 7.82 21 9 13.87 4 9l5.91-.74L12 2z"/></svg>
  <span class="absolute -top-0.5 -right-0.5 text-[9px] bg-red-500 text-white rounded-full px-1 font-bold">AI</span>
</a>

</body>
</html>
